# HTTPS — certificates managed by Certbot (Let's Encrypt)
# Domains: xurshidr.uz, xurshidbro.uz, xurshid.org (and www variants)
# To renew: /opt/certbot/bin/certbot renew
# Certbot renewal is set up as a scheduled task on the server.

server {
    server_name xurshidr.uz www.xurshidr.uz xurshidbro.uz www.xurshidbro.uz xurshid.org www.xurshid.org 64.176.59.59;

    location /static/ {
        alias /root/blog/static/;
        expires 30d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/xurshid.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/xurshid.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.xurshid.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = xurshid.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.xurshidr.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = xurshidr.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name xurshidr.uz www.xurshidr.uz xurshidbro.uz www.xurshidbro.uz xurshid.org www.xurshid.org 64.176.59.59;
    return 404; # managed by Certbot
}
