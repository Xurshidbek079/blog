<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#0f0f0f;
  color:#c8c8c8;
  font-family:system-ui,-apple-system,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box{width:100%;max-width:340px;padding:0 20px}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:#2a2a2a;margin:0 auto 40px;
}
input[type=password]{
  width:100%;
  background:#1a1a1a;
  border:1px solid #2a2a2a;
  border-radius:6px;
  color:#e0e0e0;
  font-size:16px;
  padding:12px 14px;
  outline:none;
  transition:border-color .15s;
  letter-spacing:.08em;
}
input[type=password]:focus{border-color:#444}
input[type=password]::placeholder{color:#444;letter-spacing:0}
button{
  margin-top:12px;
  width:100%;
  background:#1e1e1e;
  border:1px solid #2e2e2e;
  border-radius:6px;
  color:#aaa;
  font-size:14px;
  padding:11px;
  cursor:pointer;
  transition:background .15s,color .15s;
}
button:hover{background:#252525;color:#e0e0e0}
.err{
  margin-top:12px;
  font-size:13px;
  color:#c05050;
  text-align:center;
}
</style>
</head>
<body>
<div class="box">
  <div class="dot"></div>
  <form method="post" action="/{{ ap }}">
    <input type="password" name="p" placeholder="password" autofocus autocomplete="current-password">
    <button type="submit">Enter</button>
    {% if error %}<p class="err">Wrong password.</p>{% endif %}
  </form>
</div>
</body>
</html>
